databaseChangeLog:
  - changeSet:
      id: 001-create-property-tables
      author: property-service
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS property (
                  id             BIGSERIAL      PRIMARY KEY,
                  reference_code VARCHAR(20)    NOT NULL UNIQUE,
                  title          VARCHAR(255)   NOT NULL,
                  description    TEXT,
                  property_type  VARCHAR(50)    NOT NULL,
                  listing_type   VARCHAR(20)    NOT NULL,
                  status         VARCHAR(20)    NOT NULL,
                  price          NUMERIC(15, 2) NOT NULL,
                  currency       VARCHAR(10)    NOT NULL DEFAULT 'EUR',
                  bedrooms       INTEGER,
                  bathrooms      INTEGER,
                  area           NUMERIC(10, 2),
                  floor          INTEGER,
                  total_floors   INTEGER,
                  year_built     INTEGER,
                  address        VARCHAR(500),
                  city           VARCHAR(100),
                  country        VARCHAR(100),
                  latitude       NUMERIC(10, 8),
                  longitude      NUMERIC(11, 8),
                  agent_id       BIGINT,
                  created_at     TIMESTAMP      NOT NULL,
                  updated_at     TIMESTAMP      NOT NULL
              );

              CREATE TABLE IF NOT EXISTS property_image (
                  id            BIGSERIAL    PRIMARY KEY,
                  property_id   BIGINT       NOT NULL REFERENCES property(id) ON DELETE CASCADE,
                  url           VARCHAR(500) NOT NULL,
                  display_order INTEGER      NOT NULL DEFAULT 0,
                  is_primary    BOOLEAN      NOT NULL DEFAULT FALSE,
                  created_at    TIMESTAMP    NOT NULL
              );

              CREATE TABLE IF NOT EXISTS property_amenity (
                  id          BIGSERIAL   PRIMARY KEY,
                  property_id BIGINT      NOT NULL REFERENCES property(id) ON DELETE CASCADE,
                  name        VARCHAR(100) NOT NULL,
                  created_at  TIMESTAMP   NOT NULL
              );

              CREATE TABLE IF NOT EXISTS property_nearby_place (
                  id            BIGSERIAL      PRIMARY KEY,
                  property_id   BIGINT         NOT NULL REFERENCES property(id) ON DELETE CASCADE,
                  name          VARCHAR(100)   NOT NULL,
                  type          VARCHAR(50),
                  distance      NUMERIC(10, 2),
                  distance_unit VARCHAR(5),
                  latitude      NUMERIC(10, 8),
                  longitude     NUMERIC(11, 8)
              );

              CREATE INDEX IF NOT EXISTS idx_property_city         ON property(city);
              CREATE INDEX IF NOT EXISTS idx_property_type         ON property(property_type);
              CREATE INDEX IF NOT EXISTS idx_property_listing_type ON property(listing_type);
              CREATE INDEX IF NOT EXISTS idx_property_status       ON property(status);
              CREATE INDEX IF NOT EXISTS idx_property_price        ON property(price);
              CREATE INDEX IF NOT EXISTS idx_property_bedrooms     ON property(bedrooms);
              CREATE INDEX IF NOT EXISTS idx_property_image_pid    ON property_image(property_id);
              CREATE INDEX IF NOT EXISTS idx_property_amenity_pid  ON property_amenity(property_id);
              CREATE INDEX IF NOT EXISTS idx_property_nearby_pid   ON property_nearby_place(property_id);
