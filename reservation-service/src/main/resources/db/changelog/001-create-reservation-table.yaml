databaseChangeLog:
  - changeSet:
      id: 001-create-reservation-table
      author: reservation-service
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS reservation (
                  id                 BIGSERIAL      PRIMARY KEY,
                  reservation_number VARCHAR(30)    NOT NULL UNIQUE,
                  status             VARCHAR(20)    NOT NULL,
                  property_id        BIGINT         NOT NULL,
                  customer_name      VARCHAR(200)   NOT NULL,
                  customer_email     VARCHAR(200)   NOT NULL,
                  customer_phone     VARCHAR(50),
                  viewing_date_time  TIMESTAMP,
                  duration_minutes   INTEGER,
                  agent_notes        TEXT,
                  customer_message   TEXT,
                  internal_notes     TEXT,
                  created_at         TIMESTAMP      NOT NULL,
                  updated_at         TIMESTAMP      NOT NULL
              );

              CREATE INDEX IF NOT EXISTS idx_reservation_status      ON reservation(status);
              CREATE INDEX IF NOT EXISTS idx_reservation_property_id  ON reservation(property_id);
              CREATE INDEX IF NOT EXISTS idx_reservation_number       ON reservation(reservation_number);
              CREATE INDEX IF NOT EXISTS idx_reservation_customer_email ON reservation(customer_email);
